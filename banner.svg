<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="180" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="760" height="2" fill="url(#accent)" opacity="0.7"/>
  <rect x="0" y="178" width="760" height="2" fill="#ef4444" opacity="0.4"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#10b981" stroke-width="0.5">
    <line x1="0" y1="36" x2="760" y2="36"/>
    <line x1="0" y1="72" x2="760" y2="72"/>
    <line x1="0" y1="108" x2="760" y2="108"/>
    <line x1="0" y1="144" x2="760" y2="144"/>
  </g>

  <!-- Candlestick icon -->
  <g transform="translate(88, 72)" filter="url(#glow)">
    <!-- Green candles -->
    <line x1="-28" y1="30" x2="-28" y2="-5" stroke="#10b981" stroke-width="1.5"/>
    <rect x="-33" y="8" width="10" height="18" fill="#10b981" rx="1"/>
    <line x1="-12" y1="35" x2="-12" y2="-15" stroke="#10b981" stroke-width="1.5"/>
    <rect x="-17" y="-5" width="10" height="28" fill="#10b981" rx="1"/>
    <!-- Red candle -->
    <line x1="4" y1="25" x2="4" y2="-20" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="-1" y="-15" width="10" height="22" fill="#ef4444" rx="1"/>
    <!-- Green recovery -->
    <line x1="20" y1="20" x2="20" y2="-30" stroke="#10b981" stroke-width="1.5"/>
    <rect x="15" y="-22" width="10" height="30" fill="#10b981" rx="1"/>
    <line x1="36" y1="15" x2="36" y2="-35" stroke="#10b981" stroke-width="1.5"/>
    <rect x="31" y="-28" width="10" height="32" fill="#10b981" rx="1"/>
    <!-- EMA line -->
    <path d="M-33,15 Q-17,0 -1,-5 Q15,-18 31,-25" fill="none" stroke="#facc15" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
  </g>

  <!-- Accent divider -->
  <line x1="148" y1="20" x2="148" y2="160" stroke="#10b981" stroke-width="1" opacity="0.15"/>

  <!-- Faded indicator readout -->
  <g font-family="'Courier New', Courier, monospace" font-size="9" fill="#10b981" opacity="0.08">
    <text x="580" y="28">EMA(9): 520.42</text>
    <text x="580" y="42">EMA(21): 519.88</text>
    <text x="580" y="56">RSI(14): 64.2</text>
    <text x="580" y="70">ATR(14): 1.38</text>
    <text x="580" y="84">VOL: 2.1x AVG</text>
    <text x="580" y="98">ENTRY: PULLBACK</text>
    <text x="580" y="112">STOP: -$0.85</text>
    <text x="580" y="126">TGRT: +$1.60</text>
    <text x="580" y="140">HOLD: 5-15 min</text>
    <text x="580" y="154">SIGNAL: LONG</text>
  </g>

  <!-- Title -->
  <text x="164" y="50" font-family="'Courier New', Courier, monospace" font-size="26" font-weight="bold" fill="#10b981" filter="url(#glow)">SKYZ SPY Scalper</text>

  <!-- Subtitle -->
  <text x="166" y="74" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e">Webull Custom Indicator — 1-Min SPY Scalping</text>

  <!-- Description -->
  <text x="166" y="98" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">EMA trend  ·  Pullback entries  ·  RSI/VOL filters  ·  ATR risk framework</text>

  <!-- Badges -->
  <g font-family="'Courier New', Courier, monospace" font-size="9.5" font-weight="700">
    <rect x="166" y="110" width="46" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="189" y="122" fill="#10b981" text-anchor="middle">1-min</text>
    <rect x="218" y="110" width="38" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="237" y="122" fill="#6b7280" text-anchor="middle">EMA</text>
    <rect x="262" y="110" width="34" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="279" y="122" fill="#6b7280" text-anchor="middle">RSI</text>
    <rect x="302" y="110" width="34" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="319" y="122" fill="#6b7280" text-anchor="middle">ATR</text>
    <rect x="342" y="110" width="34" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="359" y="122" fill="#6b7280" text-anchor="middle">VOL</text>
    <rect x="382" y="110" width="48" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="406" y="122" fill="#6b7280" text-anchor="middle">SCALP</text>
  </g>

  <!-- Author -->
  <text x="166" y="160" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">SkyzFallin</text>
</svg>
